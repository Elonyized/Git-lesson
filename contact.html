<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
    <h2 style="text-align: center;">Contact Form</h2>
    <form action="" class=" container mt-5">
        <label for="">Full Name:</label>
        <input type="text" class="form-control container" placeholder="Enter Name here">
        <label for="">Email:</label>
        <input type="text" class="form-control container" placeholder="Enter Email here">
        <label for="">Phone Number:</label>
        <input type="text" class="form-control container" placeholder="Enter Phone Number here">
        <label for="">Gender:</label>
        <select name="" id="" class="form-select"required>
            <option value=""selected disabled>Select Gender</option>
            <option value="">Male</option>
            <option value="">Female</option>
        </select>

        <button type="submit" class="btn btn-primary mt-3" >Submit</button>

    </form> 
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>   
</body>
</html>
